<section id="edit-page" class="page">
    <!-- Page Header -->
    <header class="page__header">
        <h1 class="page__title">
            <span class="page__icon">📝</span>
            Editar/Remover Despesa
        </h1>
        <button class="btn btn--primary" onclick="CGD.showModal('add-modal')">
            ➕ Adicionar Despesa
        </button>
    </header>

    <!-- Date Filters -->
    <section class="date-selector">
        <div class="date-selector__group">
            <label for="editMonthSelect" class="date-selector__label">MÊS:</label>
            <select id="editMonthSelect" class="date-selector__input" onchange="CGD.applyPageFilters('edit')">
                <option>Todos os meses</option>
                <option>Janeiro</option>
                <option>Fevereiro</option>
                <option>Março</option>
                <option>Abril</option>
                <option>Maio</option>
                <option>Junho</option>
                <option>Julho</option>
                <option>Agosto</option>
                <option>Setembro</option>
                <option>Outubro</option>
                <option>Novembro</option>
                <option>Dezembro</option>
            </select>
        </div>
        <div class="date-selector__group">
            <label for="editYearSelect" class="date-selector__label">ANO:</label>
            <select id="editYearSelect" class="date-selector__input" onchange="CGD.applyPageFilters('edit')">
                <option>Todos os anos</option>
                <!-- Popular com anos dos registros do database JSON -->
            </select>
        </div>
    </section>

    <!-- Summary Cards -->
    <section class="summary">
        <div class="summary__card summary__card--blue">
            <div class="summary__value" id="totalFilteredValue">R$ 0,00</div>
            <div class="summary__label">TOTAL FILTRADO</div>
        </div>
        <div class="summary__card summary__card--gray">
            <div class="summary__value" id="itemsFoundValue">0</div>
            <div class="summary__label">DESPESAS ENCONTRADAS</div>
        </div>
        <div class="summary__card summary__card--green">
            <div class="summary__value" id="paidItemsValue">0</div>
            <div class="summary__label">DESPESAS PAGAS</div>
        </div>
        <div class="summary__card summary__card--red">
            <div class="summary__value" id="openItemsValue">0</div>
            <div class="summary__label">DESPESAS PENDENTES</div>
        </div>
    </section>

    <!-- Filters -->
    <section class="filters">
        <div class="filters__group">
            <label for="editCategoryFilter" class="filters__label">CATEGORIA</label>
            <select id="editCategoryFilter" class="filters__input" onchange="CGD.applyPageFilters('edit')">
                <option>Todas</option>
                <option>Aluguel</option>
                <option>Condomínio</option>
                <option>Serviços</option>
                <option>Impostos</option>
                <option>Seguro</option>
                <option>Compras</option>
                <option>Empréstimo</option>
                <option>Financiamento</option>
                <option>Consórcio</option>
                <option>Outra</option>
            </select>
        </div>
        <div class="filters__group">
            <label for="editStatusFilter" class="filters__label">STATUS</label>
            <select id="editStatusFilter" class="filters__input" onchange="CGD.applyPageFilters('edit')">
                <option>Todas</option>
            </select>
        </div>
        <div class="filters__group">
            <label for="editResponsibleFilter" class="filters__label">RESPONSÁVEL</label>
            <select id="editResponsibleFilter" class="filters__input" onchange="CGD.applyPageFilters('edit')">
                <option>Todos</option>
            </select>
        </div>
        <div class="filters__group">
            <label for="editSortFilter" class="filters__label">ORDENAR POR</label>
            <select id="editSortFilter" class="filters__input" onchange="CGD.applyPageFilters('edit')">
                <option>Vencimento</option>
                <option>Valor</option>
                <option>Status</option>
                <option>Descrição</option>
            </select>
        </div>
        <div class="filters__group">
            <label for="editPaymentMethodFilter" class="filters__label">FORMA DE PAGAMENTO</label>
            <select id="editPaymentMethodFilter" class="filters__input" onchange="CGD.applyPageFilters('edit')">
                <option value="Todos">Todos</option>
                <option value="Dinheiro">Dinheiro</option>
                <option value="Cheque">Cheque</option>
                <option value="Cartão (débito)">Cartão (débito)</option>
                <option value="Cartão (crédito)">Cartão (crédito)</option>
                <option value="PIX (débito)">PIX (débito)</option>
                <option value="PIX (crédito)">PIX (crédito)</option>
                <option value="Débito automático">Débito automático</option>
            </select>
        </div>
        <div class="search__container">
            <span class="search__icon">🔍</span>
            <input type="text" class="search__input" id="searchEditInput"
                placeholder="Digite para buscar por descrição, categoria ou valor..."
                oninput="CGD.performSearch('edit')">
        </div>
        <button class="btn btn--secondary" onclick="CGD.clearFilters('edit')">Limpar Filtros</button>
    </section>

    <!-- Data Table -->
    <section class="data-table">
        <table class="table" id="editExpensesTable">
            <thead class="table__header">
                <tr class="table__row">
                    <th class="table__cell table__cell--header">DESCRIÇÃO</th>
                    <th class="table__cell table__cell--header">CATEGORIA</th>
                    <th class="table__cell table__cell--header">RESPONSÁVEL</th>
                    <th class="table__cell table__cell--header">PARCELAS</th>
                    <th class="table__cell table__cell--header">VALOR (R$)</th>
                    <th class="table__cell table__cell--header">FORMA DE PAGAMENTO</th>
                    <th class="table__cell table__cell--header">VENCIMENTO</th>
                    <th class="table__cell table__cell--header">STATUS</th>
                    <th class="table__cell table__cell--header">NOVO VENCIMENTO</th>
                    <th class="table__cell table__cell--header">AÇÕES</th>
                </tr>
            </thead>
            <tbody class="table__body" id="editExpensesTableBody">
                <!-- Data populated by JS -->
            </tbody>
        </table>
    </section>
</section>
